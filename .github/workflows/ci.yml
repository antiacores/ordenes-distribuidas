name: CI                    # Nombre del workflow
on:
    push:
        branches: [ main ]     # Ejecutar en cada push a la rama main
    pull_request:
        branches: [ main ]     # Ejecutar en cada PR hacia la rama main

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
            uses: actions/checkout@v4
            
            - name: Build all services
            run: docker compose build
            
            - name: Start services
            run: |
                cp .env.example .env
                docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env up --build -d
            
            - name: Wait for services to be healthy
            run: |
                echo "Esperando a que los servicios estén saludables..."
                timeout 120 bash -c '
                    until docker compose ps --format json | python3 -c "
                    import sys, json
                    services = [json.loads(line) for line in sys.stdin]
                    unhealthy = [s[\"Name\"] for s in services if s.get("\Health\") not in (\"healthy\", \"\")]
                    if unhealthy:
                        print(f\"Esperando: {unhealthy}\")
                        sys.exit(1)
                    print(\"Todos los servicios están saludables.\")
                    "; do
                        sleep 5
                    done
                '
            - name: Run integration tests
            run: |
                chmod +x ./scripts/test.sh
                ./scripts/test.sh
            
            - name: Show logs on failure
            if: failure()
            run: docker compose logs --tail=100

            - name: Cleanup
            if: always()
            run: docker compose down -v