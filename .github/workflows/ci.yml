name: CI                    # Nombre del workflow
on:
  push:
    branches: [ main ]     # Ejecutar en cada push a la rama main
  pull_request:
    branches: [ main ]     # Ejecutar en cada PR hacia la rama main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Start services
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env up --build -d

      - name: Wait for services to be healthy
        run: python3 scripts/wait_healthy.py
    
      - name: Check services status
        run: |
          echo "Esperando a que api-gateway esté healthy..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ordenes-distribuidas-api-gateway-1 2>/dev/null || echo "none")
            echo "api-gateway health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "api-gateway listo."
              break
            fi
            sleep 5
          done
          docker compose ps

      - name: Run integration tests
        run: |
          chmod +x ./scripts/test.sh
          ./scripts/test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v